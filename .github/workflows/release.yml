name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: venv-manager
          - goos: linux
            goarch: arm64
            binary: venv-manager-arm64
          - goos: windows
            goarch: amd64
            binary: venv-manager.exe
          - goos: darwin
            goarch: amd64
            binary: venv-manager-darwin
          - goos: darwin
            goarch: arm64
            binary: venv-manager-darwin-arm64

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.binary }} ./cmd/venv-manager
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.binary }}
          fail_on_unmatched_files: true
